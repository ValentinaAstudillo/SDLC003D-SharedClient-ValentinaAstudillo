name: Pipeline de Test (validación)

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm instal

      - name: Ejecutar tests
        run: npm test

      - name: Validar construccion Docker
        run: docker build -t validacion-local:${{ github.sha }} .