name: CD Pipeline Blue-Green con Rollback

on:
  workflow_dispatch:

jobs:
  deploy-blue-green:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar kubectl con K3s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_K3S }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl get nodes

      - name: Deploy Blue-Green
        id: deploy-step
        run: |
          kubectl apply -f k8s/blue-green.yaml
          kubectl rollout status deployment/duoc-app-green --timeout=120s

      - name: Validación de salud Green
        id: health-check
        run: |
          kubectl wait --for=condition=ready pod -l app=duoc-app,version=green --timeout=120s
          kubectl get pods -l app=duoc-app,version=green

      - name: Cambiar tráfico a Green
        run: |
          kubectl patch service duoc-app-bg-service -p '{"spec":{"selector":{"app":"duoc-app","version":"green"}}}'
          echo "Tráfico cambiado correctamente a Green."

      - name: Rollback automático a Blue
        if: failure()
        run: |
          echo "Fallo detectado. Ejecutando rollback automático..."
          kubectl patch service duoc-app-bg-service -p '{"spec":{"selector":{"app":"duoc-app","version":"blue"}}}'
          echo "Rollback completado. El tráfico volvió a Blue."