apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-deployment
  labels:
    app: duoc-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: duoc-app

  template:
    metadata:
      labels:
        app: duoc-app

    spec:
      containers:
      - name: node-app-container
        image: 575508784185.dkr.ecr.us-east-1.amazonaws.com/duoc-lab:v1

        ports:
        - containerPort: 3000

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health-fail
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

        livenessProbe:
          httpGet:
            path: /health-fail
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

  strategy:
    type: RollingUpdate

---
apiVersion: v1
kind: Service

metadata:
  name: duoc-app-service
  labels:
    app: duoc-app

spec:
  selector:
    app: duoc-app

  type: LoadBalancer

  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000