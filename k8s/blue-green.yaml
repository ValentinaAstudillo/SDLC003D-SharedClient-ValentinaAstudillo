apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-blue
  labels:
    app: duoc-app
    version: blue

spec:
  replicas: 1

  selector:
    matchLabels:
      app: duoc-app
      version: blue

  template:
    metadata:
      labels:
        app: duoc-app
        version: blue

    spec:
      containers:
      - name: node-app-container
        image: valentinapaz/demo-api:latest

        ports:
        - containerPort: 3000

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: duoc-app-bg-service

spec:
  selector:
    app: duoc-app
    version: blue

  type: LoadBalancer

  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-green
  labels:
    app: duoc-app
    version: green

spec:
  replicas: 1

  selector:
    matchLabels:
      app: duoc-app
      version: green

  template:
    metadata:
      labels:
        app: duoc-app
        version: green

    spec:
      containers:
      - name: node-app-container
        image: valentinapaz/demo-api:latest

        ports:
        - containerPort: 3000

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10