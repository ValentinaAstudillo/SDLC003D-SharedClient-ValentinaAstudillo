apiVersion: v1
kind: Service
metadata:
  name: duoc-app-canary-service
  labels:
    app: duoc-app

spec:
  selector:
    app: duoc-app

  type: LoadBalancer

  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-stable-v1
  labels:
    app: duoc-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: duoc-app
      version: stable

  template:
    metadata:
      labels:
        app: duoc-app
        version: stable

    spec:
      containers:
      - name: node-app-container
        image: 575508784185.dkr.ecr.us-east-1.amazonaws.com/duoc-lab:v1

        ports:
        - containerPort: 3000

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-canary-v2
  labels:
    app: duoc-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: duoc-app
      version: canary

  template:
    metadata:
      labels:
        app: duoc-app
        version: canary

    spec:
      containers:
      - name: node-app-container
        image: 575508784185.dkr.ecr.us-east-1.amazonaws.com/duoc-lab:v2

        ports:
        - containerPort: 3000

        imagePullPolicy: Always

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10